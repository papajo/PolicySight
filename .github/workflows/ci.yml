name: PolicySight CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: policysight
          POSTGRES_PASSWORD: policysight
          POSTGRES_DB: policysight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U policysight"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ -v --cov=src --cov-report=term --cov-report=xml
        env:
          DATABASE_URL: postgresql://policysight:policysight@localhost:5432/policysight
          JWT_SECRET: test-secret

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --no-audit

      - name: Lint check
        run: |
          cd frontend
          npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: policysight:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max