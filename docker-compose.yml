version: "3.9"

services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://policysight:policysight@db:5432/policysight
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - policysight-net

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - policysight-net

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: policysight
      POSTGRES_PASSWORD: policysight
      POSTGRES_DB: policysight
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policysight"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - policysight-net

volumes:
  pgdata:

networks:
  policysight-net:
    driver: bridge